<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background - dark terminal style -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>

  <!-- Terminal window dots -->
  <circle cx="80" cy="80" r="12" fill="#EF4444" opacity="0.9"/>
  <circle cx="116" cy="80" r="12" fill="#F59E0B" opacity="0.9"/>
  <circle cx="152" cy="80" r="12" fill="#22C55E" opacity="0.9"/>

  <!-- Terminal prompt line -->
  <text x="80" y="168" font-family="monospace" font-weight="bold" font-size="56" fill="#22C55E" opacity="0.9">$&gt;</text>

  <!-- Main </> code symbol - large and prominent -->
  <text x="256" y="310" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="160" fill="url(#glow)">&lt;/&gt;</text>

  <!-- Cursor blink line -->
  <rect x="358" y="340" width="6" height="40" rx="2" fill="#38BDF8" opacity="0.8"/>

  <!-- Bottom function decoration -->
  <text x="256" y="430" text-anchor="middle" font-family="monospace" font-size="40" fill="#64748B" opacity="0.6">{ dev.tools }</text>
</svg>
