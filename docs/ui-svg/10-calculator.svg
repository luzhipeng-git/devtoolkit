<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- 外框 -->
  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>
  <!-- macOS 三色按钮 -->
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <!-- 应用图标 -->
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <!-- 标题文字 -->
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>
  <!-- 窗口操作按钮 -->
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏背景 -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>
  <!-- 侧边栏收起按钮 -->
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>

  <!-- 搜索框 -->
  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 分类 -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>
  <rect x="8" y="120" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="140" font-size="12" fill="#475569">Hex 转换</text>
  <rect x="8" y="154" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="174" font-size="12" fill="#475569">Base64 编解码</text>
  <rect x="8" y="188" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="208" font-size="12" fill="#475569">ASCII 转换</text>
  <rect x="8" y="222" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="242" font-size="12" fill="#475569">URL 编解码</text>
  <rect x="8" y="256" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="276" font-size="12" fill="#475569">Unicode 编解码</text>

  <!-- JSON 工具 分类 -->
  <text x="16" y="312" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">JSON 工具</text>
  <rect x="8" y="320" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="340" font-size="12" fill="#475569">Pretty 格式化</text>
  <rect x="8" y="354" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="374" font-size="12" fill="#475569">JSON 压缩</text>
  <rect x="8" y="388" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="408" font-size="12" fill="#475569">反序列化</text>
  <rect x="8" y="422" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="442" font-size="12" fill="#475569">JSONPath 查询</text>

  <!-- 加密解密 分类 -->
  <text x="16" y="478" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">加密解密</text>
  <rect x="8" y="486" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="506" font-size="12" fill="#475569">AES 加密/解密</text>
  <rect x="8" y="522" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="542" font-size="12" fill="#475569">DES / 3DES</text>
  <rect x="8" y="556" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="576" font-size="12" fill="#475569">RSA 工具</text>
  <rect x="8" y="590" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="610" font-size="12" fill="#475569">哈希摘要</text>
  <rect x="8" y="624" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="644" font-size="12" fill="#475569">密钥工具</text>

  <!-- 数字计算 分类 -->
  <text x="16" y="680" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">数字计算</text>
  <!-- 进制转换 选中态 -->
  <rect x="8" y="688" width="224" height="32" rx="6" fill="#eff6ff"/>
  <rect x="8" y="688" width="3" height="32" rx="1" fill="#3b82f6"/>
  <text x="24" y="708" font-size="12" fill="#2563eb" font-weight="500">进制转换</text>
  <rect x="8" y="722" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="742" font-size="12" fill="#475569">公式求值</text>
  <rect x="8" y="756" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="776" font-size="12" fill="#475569">取模 / 整除</text>

  <!-- 内容区背景 -->
  <rect x="240" y="40" width="960" height="760" fill="#ffffff"/>

  <!-- 面包屑导航 -->
  <text x="268" y="70" font-size="12" fill="#94a3b8">数字计算</text>
  <text x="330" y="70" font-size="12" fill="#cbd5e1">/</text>
  <text x="342" y="70" font-size="12" fill="#1e293b" font-weight="500">进制转换</text>

  <!-- 主面板卡片 -->
  <rect x="256" y="88" width="928" height="692" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 上块: 输入区 -->
  <text x="280" y="118" font-size="14" fill="#1e293b" font-weight="600">输入数值</text>

  <!-- 大输入框 -->
  <rect x="280" y="130" width="880" height="44" rx="8" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="296" y="158" font-size="14" fill="#94a3b8">请输入数值...</text>

  <!-- 结果卡片标题 -->
  <text x="280" y="204" font-size="13" fill="#1e293b" font-weight="500">转换结果</text>

  <!-- 结果卡片 1: 二进制 普通态 -->
  <rect x="280" y="216" width="206" height="88" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="240" font-size="11" fill="#64748b" font-weight="500">二进制</text>
  <text x="300" y="264" font-size="15" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">1010101111001101</text>
  <!-- 复制按钮 -->
  <rect x="440" y="224" width="34" height="22" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="447" y="240" font-size="10" fill="#64748b">复制</text>

  <!-- 结果卡片 2: 八进制 普通态 -->
  <rect x="498" y="216" width="206" height="88" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="518" y="240" font-size="11" fill="#64748b" font-weight="500">八进制</text>
  <text x="518" y="264" font-size="15" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">125715</text>
  <!-- 复制按钮 -->
  <rect x="658" y="224" width="34" height="22" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="665" y="240" font-size="10" fill="#64748b">复制</text>

  <!-- 结果卡片 3: 十进制 选中高亮态 -->
  <rect x="716" y="216" width="206" height="88" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="736" y="240" font-size="11" fill="#3b82f6" font-weight="500">十进制</text>
  <text x="736" y="264" font-size="15" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">43949</text>
  <!-- 选中标记 -->
  <circle cx="953" cy="229" r="8" fill="#3b82f6"/>
  <polyline points="949,229 952,232 957,226" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 复制按钮 -->
  <rect x="876" y="224" width="34" height="22" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="883" y="240" font-size="10" fill="#3b82f6">复制</text>

  <!-- 结果卡片 4: 十六进制 普通态 -->
  <rect x="934" y="216" width="206" height="88" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="954" y="240" font-size="11" fill="#64748b" font-weight="500">十六进制</text>
  <text x="954" y="264" font-size="15" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">ABCD</text>
  <!-- 复制按钮 -->
  <rect x="1094" y="224" width="34" height="22" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1101" y="240" font-size="10" fill="#64748b">复制</text>

  <!-- 分割线 -->
  <line x1="280" y1="320" x2="1160" y2="320" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 中块: 参数区 -->
  <rect x="270" y="328" width="900" height="110" rx="8" fill="#f8fafc"/>

  <!-- 输入进制选择 -->
  <text x="296" y="354" font-size="12" fill="#64748b">输入进制</text>
  <!-- 单选按钮组 -->
  <circle cx="374" cy="350" r="8" fill="#3b82f6"/>
  <circle cx="374" cy="350" r="4" fill="#ffffff"/>
  <text x="388" y="354" font-size="12" fill="#1e293b">自动检测</text>

  <circle cx="470" cy="350" r="8" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="484" y="354" font-size="12" fill="#475569">二进制</text>

  <circle cx="546" cy="350" r="8" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="560" y="354" font-size="12" fill="#475569">八进制</text>

  <circle cx="622" cy="350" r="8" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="636" y="354" font-size="12" fill="#475569">十进制</text>

  <circle cx="698" cy="350" r="8" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="712" y="354" font-size="12" fill="#475569">十六进制</text>

  <!-- 数字类型 -->
  <text x="296" y="390" font-size="12" fill="#64748b">数字类型</text>
  <!-- 整数 选中态 -->
  <rect x="374" y="376" width="56" height="24" rx="4" fill="#3b82f6"/>
  <text x="386" y="392" font-size="12" fill="#ffffff">整数</text>
  <!-- 浮点数 普通态 -->
  <rect x="438" y="376" width="68" height="24" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="450" y="392" font-size="12" fill="#475569">浮点数</text>

  <!-- 补零位数 -->
  <text x="540" y="390" font-size="12" fill="#64748b">补零位数</text>
  <rect x="618" y="376" width="100" height="24" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="632" y="392" font-size="12" fill="#1e293b">无</text>
  <!-- 下拉箭头 -->
  <polyline points="702,384 708,390 714,384" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 分割线 -->
  <line x1="280" y1="448" x2="1160" y2="448" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 下块: 批量转换区 (可折叠) -->
  <!-- 标题行 -->
  <text x="280" y="476" font-size="14" fill="#1e293b" font-weight="600">批量转换</text>
  <!-- 折叠箭头 向下 -->
  <polyline points="360,470 366,476 372,470" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 展开/收起提示 -->
  <text x="384" y="476" font-size="11" fill="#94a3b8">已展开</text>

  <!-- 多行文本输入框 -->
  <rect x="280" y="492" width="880" height="80" rx="8" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="296" y="516" font-size="12" fill="#94a3b8">每行输入一个数字，支持多种进制混合输入...</text>
  <!-- 示例内容 -->
  <text x="296" y="536" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">43949</text>
  <text x="296" y="554" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">0xABCD</text>

  <!-- 批量转换按钮 -->
  <rect x="1080" y="492" width="80" height="32" rx="6" fill="url(#primaryBtn)"/>
  <text x="1094" y="513" font-size="12" fill="#ffffff" font-weight="500">批量转换</text>

  <!-- 批量转换结果表格 -->
  <rect x="280" y="584" width="880" height="190" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 表头 -->
  <rect x="280" y="584" width="880" height="32" rx="8" fill="#f1f5f9"/>
  <rect x="280" y="600" width="880" height="16" fill="#f1f5f9"/>
  <text x="320" y="605" font-size="12" fill="#64748b" font-weight="600">输入值</text>
  <text x="498" y="605" font-size="12" fill="#64748b" font-weight="600">二进制</text>
  <text x="698" y="605" font-size="12" fill="#64748b" font-weight="600">八进制</text>
  <text x="878" y="605" font-size="12" fill="#64748b" font-weight="600">十进制</text>
  <text x="1048" y="605" font-size="12" fill="#64748b" font-weight="600">十六进制</text>

  <!-- 表头分割线 -->
  <line x1="280" y1="616" x2="1160" y2="616" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 列分割线 -->
  <line x1="480" y1="584" x2="480" y2="774" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="680" y1="584" x2="680" y2="774" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="860" y1="584" x2="860" y2="774" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="1030" y1="584" x2="1030" y2="774" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 表格第一行 -->
  <text x="320" y="640" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">43949</text>
  <text x="498" y="640" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">1010101111001101</text>
  <text x="698" y="640" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">125715</text>
  <text x="878" y="640" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">43949</text>
  <text x="1048" y="640" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">ABCD</text>

  <!-- 行分割线 -->
  <line x1="280" y1="654" x2="1160" y2="654" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 表格第二行 -->
  <text x="320" y="678" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">0xABCD</text>
  <text x="498" y="678" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">1010101111001101</text>
  <text x="698" y="678" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">125715</text>
  <text x="878" y="678" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">43949</text>
  <text x="1048" y="678" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">ABCD</text>

  <!-- 行分割线 -->
  <line x1="280" y1="692" x2="1160" y2="692" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 表格第三行（空行占位） -->
  <text x="320" y="716" font-size="12" fill="#94a3b8" font-family="Consolas, 'Courier New', monospace">0o125715</text>
  <text x="498" y="716" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">1010101111001101</text>
  <text x="698" y="716" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">125715</text>
  <text x="878" y="716" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">43949</text>
  <text x="1048" y="716" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">ABCD</text>

  <!-- 行分割线 -->
  <line x1="280" y1="730" x2="1160" y2="730" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 表格空行提示 -->
  <text x="640" y="756" font-size="12" fill="#94a3b8">继续输入更多数值以查看批量转换结果...</text>
</svg>
