  <rect x="670" y="510" width="20" height="20" fill="#1e293b"/>
  <rect x="630" y="530" width="20" height="20" fill="#1e293b"/>
  <rect x="670" y="530" width="20" height="20" fill="#1e293b"/>
  <rect x="630" y="510" width="20" height="20" fill="#1e293b"/>
  <rect x="650" y="530" width="20" height="20" fill="#1e293b"/>
  <rect x="670" y="530" width="20" height="20" fill="#1e293b"/>
  <text x="644" y="576" font-size="12" fill="#94a3b8">二维码预览</text>

  <!-- 操作按钮行 -->
  <!-- 下载PNG按钮 -->
