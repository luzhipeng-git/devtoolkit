  <text x="756" y="686" font-size="13" fill="#475569">复制到剪贴板</text>

  <!-- 解析 Tab 内容 -->
  <!-- 拖拽区域 -->
  <rect x="280" y="330" width="888" height="220" rx="10" fill="#f8fafc" stroke="#d0d5dd" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- upload icon placeholder -->
  <rect x="700" y="380" width="48" height="48" rx="8" fill="#e2e8f0"/>
  <text x="712" y="412" font-size="22" fill="#94a3b8">+</text>
