<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏 -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>

  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>
  <rect x="8" y="120" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="138" font-size="12" fill="#475569">Hex 转换</text>
  <rect x="8" y="150" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="168" font-size="12" fill="#475569">Base64 编解码</text>
  <rect x="8" y="180" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="198" font-size="12" fill="#475569">ASCII 转换</text>
  <rect x="8" y="210" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="228" font-size="12" fill="#475569">URL 编解码</text>
  <rect x="8" y="240" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="258" font-size="12" fill="#475569">Unicode 编解码</text>

  <!-- JSON -->
  <text x="16" y="290" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">JSON 工具</text>
  <rect x="8" y="298" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="316" font-size="12" fill="#475569">Pretty 格式化</text>
  <rect x="8" y="328" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="346" font-size="12" fill="#475569">JSON 压缩</text>
  <rect x="8" y="358" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="376" font-size="12" fill="#475569">反序列化</text>
  <rect x="8" y="388" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="406" font-size="12" fill="#475569">JSONPath 查询</text>
  <rect x="8" y="418" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="436" font-size="12" fill="#475569">Diff</text>

  <!-- 加密解密 -->
  <text x="16" y="470" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">加密解密</text>
  <rect x="8" y="478" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="496" font-size="12" fill="#475569">AES 加密/解密</text>
  <rect x="8" y="508" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="526" font-size="12" fill="#475569">DES / 3DES</text>
  <rect x="8" y="538" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="556" font-size="12" fill="#475569">RSA 工具</text>
  <rect x="8" y="568" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="586" font-size="12" fill="#475569">哈希摘要</text>
  <rect x="8" y="598" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="616" font-size="12" fill="#475569">密钥工具</text>
  <rect x="8" y="628" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="646" font-size="12" fill="#475569">OpenSSL</text>

  <!-- 编码解码 -->
  <text x="16" y="680" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">编码解码</text>
  <rect x="8" y="688" width="224" height="28" rx="6" fill="#eff6ff"/>
  <rect x="8" y="688" width="3" height="28" rx="1" fill="#3b82f6"/>
  <text x="24" y="706" font-size="12" fill="#2563eb" font-weight="500">JWT 编解码</text>
  <rect x="8" y="718" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="736" font-size="12" fill="#475569">HTML 实体</text>
  <rect x="8" y="748" width="224" height="28" rx="6" fill="transparent"/>
  <text x="24" y="766" font-size="12" fill="#475569">颜色转换</text>

  <!-- 侧边栏滚动条 -->
  <rect x="234" y="52" width="4" height="720" rx="2" fill="#f1f5f9"/>
  <rect x="234" y="52" width="4" height="200" rx="2" fill="#cbd5e1"/>

  <!-- 内容区 -->
  <rect x="240" y="40" width="960" height="760" fill="#ffffff"/>
  <text x="268" y="70" font-size="12" fill="#94a3b8">编码解码</text>
  <text x="330" y="70" font-size="12" fill="#cbd5e1">/</text>
  <text x="342" y="70" font-size="12" fill="#1e293b" font-weight="500">JWT 编解码</text>

  <!-- 工具面板 -->
  <rect x="256" y="88" width="928" height="690" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Tab: 解码(选中) | 编码 -->
  <rect x="276" y="104" width="80" height="32" rx="6" fill="url(#primaryBtn)"/>
  <text x="298" y="124" font-size="13" fill="#ffffff" font-weight="500">解码</text>
  <rect x="364" y="104" width="80" height="32" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="386" y="124" font-size="13" fill="#64748b">编码</text>

  <!-- JWT Token 输入框 -->
  <rect x="276" y="148" width="888" height="40" rx="6" fill="#f8fafc"/>
  <text x="292" y="172" font-size="12" fill="#64748b" font-weight="500">JWT Token</text>
  <rect x="376" y="155" width="680" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="388" y="173" font-size="11" fill="#94a3b8" font-family="'Consolas', monospace">eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbiIsIm5hbWUiOiLlvKDkuIkiLCJpYXQiOjE3MTM3NDQwMDB9.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c</text>

  <!-- 三段分色解析结果 -->
  <!-- Header 段 -->
  <rect x="276" y="204" width="888" height="24" rx="0" fill="#eff6ff"/>
  <text x="292" y="220" font-size="12" fill="#2563eb" font-weight="600">Header</text>
  <rect x="340" y="208" width="70" height="18" rx="3" fill="#dbeafe"/>
  <text x="348" y="221" font-size="10" fill="#3b82f6">ALGORITHM</text>
  <text x="424" y="221" font-size="10" fill="#64748b">HS256</text>
  <rect x="472" y="208" width="50" height="18" rx="3" fill="#dbeafe"/>
  <text x="480" y="221" font-size="10" fill="#3b82f6">TYPE</text>
  <text x="530" y="221" font-size="10" fill="#64748b">JWT</text>

  <rect x="276" y="228" width="888" height="48" rx="0" fill="#eff6ff" opacity="0.5"/>
  <text x="292" y="250" font-size="12" fill="#1e293b" font-family="'Consolas', monospace">{</text>
  <text x="308" y="266" font-size="12" fill="#3b82f6" font-family="'Consolas', monospace">"alg"</text>
  <text x="352" y="266" font-size="12" fill="#94a3b8" font-family="'Consolas', monospace">:</text>
  <text x="368" y="266" font-size="12" fill="#16a34a" font-family="'Consolas', monospace">"HS256"</text>
  <text x="440" y="266" font-size="12" fill="#94a3b8" font-family="'Consolas', monospace">,</text>
  <text x="308" y="250" font-size="12" fill="#3b82f6" font-family="'Consolas', monospace">"typ"</text>
  <text x="352" y="250" font-size="12" fill="#94a3b8" font-family="'Consolas', monospace">:</text>
  <text x="368" y="250" font-size="12" fill="#16a34a" font-family="'Consolas', monospace">"JWT"</text>
  <text x="414" y="250" font-size="12" fill="#1e293b" font-family="'Consolas', monospace">}</text>

  <!-- Payload 段 -->
  <rect x="276" y="286" width="888" height="24" rx="0" fill="#fefce8"/>
  <text x="292" y="302" font-size="12" fill="#a16207" font-weight="600">Payload</text>
  <rect x="352" y="290" width="70" height="18" rx="3" fill="#fef9c3"/>
  <text x="360" y="303" font-size="10" fill="#a16207">ISSUED</text>
  <text x="430" y="303" font-size="10" fill="#64748b">2024-04-22 00:00:00</text>
  <rect x="590" y="290" width="70" height="18" rx="3" fill="#fef9c3"/>
  <text x="598" y="303" font-size="10" fill="#a16207">EXPIRES</text>
  <text x="668" y="303" font-size="10" fill="#16a34a">未设置</text>

  <rect x="276" y="310" width="888" height="80" rx="0" fill="#fefce8" opacity="0.3"/>
  <text x="292" y="332" font-size="12" fill="#1e293b" font-family="'Consolas', monospace">{</text>
  <text x="308" y="348" font-size="12" fill="#3b82f6" font-family="'Consolas', monospace">"sub"</text>
  <text x="352" y="348" font-size="12" fill="#94a3b8">:</text>
  <text x="368" y="348" font-size="12" fill="#16a34a" font-family="'Consolas', monospace">"admin"</text>
  <text x="440" y="348" font-size="12" fill="#94a3b8">,</text>
  <text x="308" y="364" font-size="12" fill="#3b82f6" font-family="'Consolas', monospace">"name"</text>
  <text x="368" y="364" font-size="12" fill="#94a3b8">:</text>
  <text x="384" y="364" font-size="12" fill="#16a34a" font-family="'Consolas', monospace">"张三"</text>
  <text x="432" y="364" font-size="12" fill="#94a3b8">,</text>
  <text x="308" y="380" font-size="12" fill="#3b82f6" font-family="'Consolas', monospace">"iat"</text>
  <text x="344" y="380" font-size="12" fill="#94a3b8">:</text>
  <text x="360" y="380" font-size="12" fill="#ea580c" font-family="'Consolas', monospace">1713744000</text>
  <text x="456" y="380" font-size="12" fill="#1e293b" font-family="'Consolas', monospace">}</text>

  <!-- Signature 段 -->
  <rect x="276" y="400" width="888" height="24" rx="0" fill="#f8fafc"/>
  <text x="292" y="416" font-size="12" fill="#64748b" font-weight="600">Signature</text>
  <rect x="276" y="424" width="888" height="32" rx="0" fill="#f8fafc" opacity="0.5"/>
  <text x="292" y="444" font-size="11" fill="#94a3b8" font-family="'Consolas', monospace">HMACSHA256( base64UrlEncode(header) + "." + base64UrlEncode(payload), secret )</text>
  <text x="292" y="456" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c</text>

  <!-- 编码Tab内容（预览态，灰色半透明表示切换后可见） -->
  <text x="292" y="500" font-size="12" fill="#cbd5e1">切换到"编码"Tab后：</text>

  <rect x="276" y="510" width="888" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="292" y="532" font-size="11" fill="#94a3b8">算法选择：HS256 / HS384 / HS512 / RS256 / RS384 / RS512</text>

  <rect x="276" y="554" width="428" height="90" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="292" y="572" font-size="11" fill="#94a3b8">Header（JSON）</text>
  <text x="292" y="590" font-size="11" fill="#cbd5e1" font-family="'Consolas', monospace">{"alg":"HS256","typ":"JWT"}</text>

  <rect x="716" y="554" width="448" height="90" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="732" y="572" font-size="11" fill="#94a3b8">Payload（JSON）</text>
  <text x="732" y="590" font-size="11" fill="#cbd5e1" font-family="'Consolas', monospace">{"sub":"admin","name":"张三","iat":1713744000}</text>

  <rect x="276" y="654" width="888" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="292" y="676" font-size="11" fill="#94a3b8">密钥（Secret）：</text>
  <rect x="400" y="660" width="500" height="24" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="412" y="677" font-size="11" fill="#cbd5e1">输入密钥...</text>
  <rect x="912" y="660" width="90" height="24" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="928" y="677" font-size="11" fill="#ffffff">生成Token</text>

  <rect x="276" y="700" width="888" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="292" y="718" font-size="11" fill="#cbd5e1" font-family="'Consolas', monospace">生成的 JWT Token 将显示在这里...</text>

  <!-- 底部操作 -->
  <rect x="1094" y="204" width="68" height="24" rx="4" fill="url(#primaryBtn)"/>
  <text x="1110" y="220" font-size="11" fill="#ffffff">复制</text>
</svg>
