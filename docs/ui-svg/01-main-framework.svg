<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- 窗口外框 viewBox等比缩放,实际尺寸由桌面窗口决定 -->
  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 占总高5% -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>

  <!-- 窗口控制按钮 -->
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>

  <!-- 应用图标 -->
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>

  <!-- 窗口操作 -->
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏 展开态 占总宽20% -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>

  <!-- 收拢/展开切换按钮 -->
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>

  <!-- 搜索框 -->
  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>
  <rect x="8" y="120" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="140" font-size="12" fill="#475569">Hex 转换</text>
  <rect x="8" y="154" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="174" font-size="12" fill="#475569">Base64 编解码</text>
  <rect x="8" y="188" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="208" font-size="12" fill="#475569">ASCII 转换</text>
  <rect x="8" y="222" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="242" font-size="12" fill="#475569">URL 编解码</text>
  <rect x="8" y="256" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="276" font-size="12" fill="#475569">Unicode 编解码</text>

  <!-- JSON -->
  <text x="16" y="312" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">JSON 工具</text>
  <rect x="8" y="320" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="340" font-size="12" fill="#475569">Pretty 格式化</text>
  <rect x="8" y="354" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="374" font-size="12" fill="#475569">JSON 压缩</text>
  <rect x="8" y="388" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="408" font-size="12" fill="#475569">反序列化</text>
  <rect x="8" y="422" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="442" font-size="12" fill="#475569">JSONPath 查询</text>

  <!-- 加密解密 -->
  <text x="16" y="478" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">加密解密</text>
  <rect x="8" y="486" width="224" height="32" rx="6" fill="#eff6ff"/>
  <rect x="8" y="486" width="3" height="32" rx="1" fill="#3b82f6"/>
  <text x="24" y="506" font-size="12" fill="#2563eb" font-weight="500">AES 加密/解密</text>
  <rect x="8" y="522" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="542" font-size="12" fill="#475569">DES / 3DES</text>
  <rect x="8" y="556" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="576" font-size="12" fill="#475569">RSA 工具</text>
  <rect x="8" y="590" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="610" font-size="12" fill="#475569">哈希摘要</text>
  <rect x="8" y="624" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="644" font-size="12" fill="#475569">密钥工具</text>

  <!-- 数字计算 -->
  <text x="16" y="680" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">数字计算</text>
  <rect x="8" y="688" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="708" font-size="12" fill="#475569">进制转换</text>
  <rect x="8" y="722" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="742" font-size="12" fill="#475569">公式求值</text>
  <rect x="8" y="756" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="776" font-size="12" fill="#475569">取模 / 整除</text>

  <!-- 内容区 占总宽80% flex自适应 -->
  <rect x="240" y="40" width="960" height="760" fill="#ffffff"/>

  <!-- 面包屑 -->
  <text x="268" y="70" font-size="12" fill="#94a3b8">加密解密</text>
  <text x="330" y="70" font-size="12" fill="#cbd5e1">/</text>
  <text x="342" y="70" font-size="12" fill="#1e293b" font-weight="500">AES 加密/解密</text>

  <!-- 工具面板卡片 -->
  <rect x="256" y="88" width="928" height="690" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Tab -->
  <rect x="276" y="104" width="80" height="32" rx="6" fill="url(#primaryBtn)"/>
  <text x="298" y="124" font-size="13" fill="#ffffff" font-weight="500">加密</text>
  <rect x="364" y="104" width="80" height="32" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="386" y="124" font-size="13" fill="#64748b">解密</text>

  <!-- 参数配置区 -->
  <rect x="276" y="148" width="888" height="44" rx="8" fill="#f8fafc"/>
  <text x="292" y="175" font-size="12" fill="#64748b">模式</text>
  <rect x="328" y="158" width="88" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="340" y="176" font-size="11" fill="#1e293b">CBC  ▾</text>
  <text x="432" y="175" font-size="12" fill="#64748b">填充</text>
  <rect x="468" y="158" width="88" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="480" y="176" font-size="11" fill="#1e293b">PKCS7  ▾</text>
  <text x="572" y="175" font-size="12" fill="#64748b">密钥长度</text>
  <rect x="636" y="158" width="88" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="652" y="176" font-size="11" fill="#1e293b">256  ▾</text>
  <text x="740" y="175" font-size="12" fill="#64748b">输出</text>
  <rect x="776" y="158" width="88" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="790" y="176" font-size="11" fill="#1e293b">Base64  ▾</text>

  <!-- 密钥输入行 -->
  <rect x="276" y="204" width="888" height="42" rx="8" fill="#f8fafc"/>
  <text x="292" y="230" font-size="12" fill="#64748b">密钥</text>
  <rect x="328" y="212" width="570" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="340" y="230" font-size="11" fill="#94a3b8">输入密钥（HEX 或 Base64）</text>
  <rect x="910" y="212" width="28" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="918" y="230" font-size="10" fill="#94a3b8">eye</text>
  <rect x="944" y="212" width="28" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="950" y="230" font-size="10" fill="#94a3b8">cp</text>
  <rect x="980" y="212" width="90" height="26" rx="4" fill="url(#primaryBtn)"/>
  <text x="992" y="230" font-size="11" fill="#ffffff">随机生成</text>

  <!-- IV 输入行 -->
  <rect x="276" y="254" width="888" height="42" rx="8" fill="#f8fafc"/>
  <text x="292" y="280" font-size="12" fill="#64748b">IV</text>
  <rect x="328" y="262" width="570" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="340" y="280" font-size="11" fill="#94a3b8">输入初始化向量（可选）</text>
  <rect x="910" y="262" width="28" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="918" y="280" font-size="10" fill="#94a3b8">eye</text>
  <rect x="944" y="262" width="28" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="950" y="280" font-size="10" fill="#94a3b8">cp</text>
  <rect x="980" y="262" width="90" height="26" rx="4" fill="url(#primaryBtn)"/>
  <text x="992" y="280" font-size="11" fill="#ffffff">随机生成</text>

  <!-- 输入区 -->
  <rect x="276" y="308" width="428" height="28" fill="#f8fafc"/>
  <line x1="276" y1="336" x2="704" y2="336" stroke="#e2e8f0" stroke-width="1"/>
  <text x="292" y="326" font-size="12" fill="#64748b" font-weight="500">输入（明文）</text>
  <text x="646" y="326" font-size="11" fill="#3b82f6">交换 ⇅</text>

  <rect x="276" y="336" width="428" height="240" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="276" y="336" width="30" height="240" fill="#f8fafc"/>
  <text x="284" y="362" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">1</text>
  <text x="284" y="385" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">2</text>
  <line x1="306" y1="336" x2="306" y2="576" stroke="#f1f5f9" stroke-width="1"/>
  <text x="316" y="362" font-size="13" fill="#1e293b" font-family="'Consolas', monospace">Hello World 你好世界</text>
  <text x="316" y="385" font-size="13" fill="#94a3b8" font-family="'Consolas', monospace">这是一段测试文本...</text>

  <!-- 输出区 -->
  <rect x="716" y="308" width="448" height="28" fill="#f8fafc"/>
  <line x1="716" y1="336" x2="1164" y2="336" stroke="#e2e8f0" stroke-width="1"/>
  <text x="732" y="326" font-size="12" fill="#64748b" font-weight="500">输出（密文）</text>

  <rect x="716" y="336" width="448" height="240" fill="#f8faff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="716" y="336" width="30" height="240" fill="#f1f5f9"/>
  <text x="724" y="362" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">1</text>
  <text x="724" y="385" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">2</text>
  <line x1="746" y1="336" x2="746" y2="576" stroke="#f1f5f9" stroke-width="1"/>
  <text x="756" y="362" font-size="13" fill="#3b82f6" font-family="'Consolas', monospace">7H8aey3Kx9Pm2/QdFw+vB4Tg...</text>
  <text x="756" y="385" font-size="13" fill="#3b82f6" font-family="'Consolas', monospace">NklPjR2sW8qA1bZ+cD5E6w==</text>

  <rect x="1088" y="546" width="68" height="24" rx="4" fill="url(#primaryBtn)"/>
  <text x="1104" y="562" font-size="11" fill="#ffffff">复制</text>
  <rect x="1088" y="516" width="68" height="24" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1102" y="532" font-size="11" fill="#64748b">下载</text>

  <!-- 历史记录 -->
  <rect x="276" y="592" width="888" height="72" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="292" y="614" font-size="11" fill="#94a3b8" font-weight="500">历史记录（最近 5 条）</text>
  <text x="1132" y="614" font-size="11" fill="#cbd5e1">清除</text>
  <rect x="292" y="624" width="196" height="30" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="304" y="643" font-size="10" fill="#64748b">AES-CBC | Hello World</text>
  <rect x="498" y="624" width="196" height="30" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="643" font-size="10" fill="#64748b">AES-GCM | test123</text>
  <rect x="704" y="624" width="196" height="30" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="716" y="643" font-size="10" fill="#64748b">AES-CBC | 中文测试</text>

  <!-- ========== 右侧: 侧边栏收拢态 ========== -->
  <line x1="600" y1="40" x2="600" y2="800" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="640" y="60" font-size="12" fill="#94a3b8" font-weight="500">侧边栏收拢态</text>

  <!-- 收拢态侧边栏 -->
  <rect x="620" y="72" width="56" height="700" rx="8" fill="#f7f8fa" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="662" y="78" width="10" height="10" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="663" y="87" font-size="8" fill="#64748b">&gt;</text>

  <!-- 搜索图标 -->
  <rect x="628" y="98" width="40" height="32" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="640" y="118" font-size="14" fill="#64748b">Q</text>

  <line x1="628" y1="142" x2="668" y2="142" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 工具缩写图标 -->
  <rect x="624" y="150" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="172" font-size="13" fill="#475569">He</text>
  <rect x="624" y="188" width="48" height="34" rx="6" fill="transparent"/>
  <text x="634" y="210" font-size="13" fill="#475569">B64</text>
  <rect x="624" y="226" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="248" font-size="13" fill="#475569">As</text>
  <rect x="624" y="264" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="286" font-size="13" fill="#475569">Ur</text>
  <rect x="624" y="302" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="324" font-size="13" fill="#475569">Un</text>

  <line x1="628" y1="350" x2="668" y2="350" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="624" y="358" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="380" font-size="13" fill="#475569">Jp</text>
  <rect x="624" y="396" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="418" font-size="13" fill="#475569">Jm</text>
  <rect x="624" y="434" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="456" font-size="13" fill="#475569">Jd</text>
  <rect x="624" y="472" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="494" font-size="13" fill="#475569">Jp</text>

  <line x1="628" y1="520" x2="668" y2="520" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 选中项 -->
  <rect x="624" y="528" width="48" height="34" rx="6" fill="#eff6ff"/>
  <rect x="624" y="528" width="3" height="34" rx="1" fill="#3b82f6"/>
  <text x="636" y="550" font-size="13" fill="#2563eb" font-weight="500">Ae</text>

  <rect x="624" y="566" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="588" font-size="13" fill="#475569">De</text>
  <rect x="624" y="604" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="626" font-size="13" fill="#475569">Rs</text>
  <rect x="624" y="642" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="664" font-size="13" fill="#475569">Ha</text>
  <rect x="624" y="680" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="702" font-size="13" fill="#475569">Ky</text>

  <line x1="628" y1="728" x2="668" y2="728" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="624" y="736" width="48" height="34" rx="6" fill="transparent"/>
  <text x="636" y="758" font-size="13" fill="#475569">Ca</text>
</svg>
