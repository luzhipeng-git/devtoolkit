<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏 -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>
  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>
  <rect x="8" y="120" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="140" font-size="12" fill="#475569">Hex 转换</text>
  <rect x="8" y="154" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="174" font-size="12" fill="#475569">Base64 编解码</text>
  <rect x="8" y="188" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="208" font-size="12" fill="#475569">ASCII 转换</text>
  <rect x="8" y="222" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="242" font-size="12" fill="#475569">URL 编解码</text>
  <rect x="8" y="256" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="276" font-size="12" fill="#475569">Unicode 编解码</text>

  <!-- JSON工具 (JSONPath 查询 选中) -->
  <text x="16" y="312" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">JSON 工具</text>
  <rect x="8" y="320" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="340" font-size="12" fill="#475569">Pretty 格式化</text>
  <rect x="8" y="354" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="374" font-size="12" fill="#475569">JSON 压缩</text>
  <rect x="8" y="388" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="408" font-size="12" fill="#475569">反序列化</text>
  <!-- 选中项: JSONPath 查询 -->
  <rect x="8" y="422" width="224" height="32" rx="6" fill="#eff6ff"/>
  <rect x="8" y="422" width="3" height="32" rx="1" fill="#3b82f6"/>
  <text x="24" y="442" font-size="12" fill="#2563eb" font-weight="500">JSONPath 查询</text>
  <rect x="8" y="456" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="476" font-size="12" fill="#475569">JSON 校验</text>
  <rect x="8" y="490" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="510" font-size="12" fill="#475569">JSON Diff</text>

  <!-- 加密解密 -->
  <text x="16" y="546" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">加密解密</text>
  <rect x="8" y="554" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="574" font-size="12" fill="#475569">AES 加密/解密</text>
  <rect x="8" y="588" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="608" font-size="12" fill="#475569">DES / 3DES</text>
  <rect x="8" y="622" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="642" font-size="12" fill="#475569">RSA 工具</text>
  <rect x="8" y="656" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="676" font-size="12" fill="#475569">哈希摘要</text>
  <rect x="8" y="690" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="710" font-size="12" fill="#475569">密钥工具</text>

  <text x="16" y="746" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">数字计算</text>
  <rect x="8" y="754" width="224" height="26" rx="6" fill="transparent"/>
  <text x="24" y="772" font-size="12" fill="#475569">进制转换</text>

  <!-- ========== 内容区 ========== -->
  <rect x="240" y="40" width="960" height="760" fill="#ffffff"/>

  <!-- 面包屑 -->
  <text x="268" y="70" font-size="12" fill="#94a3b8">JSON 工具</text>
  <text x="340" y="70" font-size="12" fill="#cbd5e1">/</text>
  <text x="352" y="70" font-size="12" fill="#1e293b" font-weight="500">JSONPath 查询</text>

  <!-- 面板卡片 -->
  <rect x="260" y="84" width="920" height="696" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- JSONPath表达式输入区 -->
  <text x="280" y="114" font-size="13" fill="#1e293b" font-weight="600">JSONPath 表达式</text>
  <!-- 输入框（蓝色边框高亮） -->
  <rect x="280" y="122" width="760" height="38" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="296" y="146" font-size="13" fill="#1e293b" font-family="'Consolas',monospace">$.address.city</text>
  <!-- 光标 -->
  <rect x="404" y="130" width="1.5" height="20" fill="#3b82f6"/>
  <!-- 查询按钮 -->
  <rect x="1060" y="122" width="100" height="38" rx="6" fill="url(#primaryBtn)"/>
  <text x="1084" y="147" font-size="13" fill="#ffffff" font-weight="500">查询</text>
  <!-- 搜索图标 -->
  <circle cx="1076" cy="140" r="5" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="1080" y1="144" x2="1084" y2="148" stroke="#ffffff" stroke-width="1.2"/>

  <!-- 表达式提示 -->
  <text x="280" y="178" font-size="11" fill="#94a3b8">常用: $ (根) . (子节点) .. (递归) [*] (所有) [?()] (过滤)</text>

  <!-- 下方左右分栏分割线 -->
  <line x1="720" y1="192" x2="720" y2="768" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 左侧：输入JSON -->
  <text x="280" y="210" font-size="13" fill="#1e293b" font-weight="600">输入 JSON</text>
  <rect x="280" y="218" width="420" height="550" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <!-- 行号 -->
  <rect x="280" y="218" width="32" height="550" rx="6" fill="#f8fafc"/>
  <line x1="312" y1="218" x2="312" y2="768" stroke="#e2e8f0" stroke-width="1"/>
  <text x="290" y="242" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">1</text>
  <text x="290" y="262" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">2</text>
  <text x="290" y="282" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">3</text>
  <text x="290" y="302" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">4</text>
  <text x="290" y="322" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">5</text>
  <text x="290" y="342" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">6</text>
  <text x="290" y="362" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">7</text>
  <text x="290" y="382" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">8</text>
  <text x="290" y="402" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">9</text>
  <text x="286" y="422" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">10</text>
  <text x="286" y="442" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">11</text>
  <text x="286" y="462" font-size="11" fill="#cbd5e1" font-family="'Consolas',monospace">12</text>

  <!-- JSON内容 (address.city 高亮) -->
  <text x="324" y="242" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">{</text>
  <text x="336" y="262" font-size="12" fill="#64748b" font-family="'Consolas',monospace">"name"</text>
  <text x="386" y="262" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">:</text>
  <text x="394" y="262" font-size="12" fill="#3b82f6" font-family="'Consolas',monospace">"张三"</text>
  <text x="442" y="262" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">,</text>
  <text x="336" y="282" font-size="12" fill="#64748b" font-family="'Consolas',monospace">"age"</text>
  <text x="376" y="282" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">:</text>
  <text x="384" y="282" font-size="12" fill="#f59e0b" font-family="'Consolas',monospace">25</text>
  <text x="400" y="282" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">,</text>
  <text x="336" y="302" font-size="12" fill="#64748b" font-family="'Consolas',monospace">"address"</text>
  <text x="412" y="302" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">: {</text>
  <!-- address.city 高亮行 -->
  <rect x="318" y="310" width="374" height="20" rx="3" fill="#fffbeb" opacity="0.8"/>
  <text x="352" y="322" font-size="12" fill="#64748b" font-family="'Consolas',monospace">"city"</text>
  <text x="396" y="322" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">:</text>
  <text x="404" y="322" font-size="12" fill="#3b82f6" font-family="'Consolas',monospace" font-weight="bold">"北京"</text>
  <text x="444" y="322" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">,</text>
  <text x="352" y="342" font-size="12" fill="#64748b" font-family="'Consolas',monospace">"zip"</text>
  <text x="388" y="342" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">:</text>
  <text x="396" y="342" font-size="12" fill="#3b82f6" font-family="'Consolas',monospace">"100000"</text>
  <text x="336" y="362" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">},</text>
  <text x="336" y="382" font-size="12" fill="#64748b" font-family="'Consolas',monospace">"tags"</text>
  <text x="380" y="382" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">:</text>
  <text x="388" y="382" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">[</text>
  <text x="352" y="402" font-size="12" fill="#3b82f6" font-family="'Consolas',monospace">"dev"</text>
  <text x="388" y="402" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">,</text>
  <text x="352" y="422" font-size="12" fill="#3b82f6" font-family="'Consolas',monospace">"test"</text>
  <text x="336" y="442" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">]</text>
  <text x="324" y="462" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">}</text>

  <!-- 右侧：匹配结果 -->
  <text x="740" y="210" font-size="13" fill="#1e293b" font-weight="600">查询结果</text>
  <text x="830" y="210" font-size="11" fill="#94a3b8">找到 1 个匹配</text>

  <rect x="740" y="218" width="420" height="550" rx="6" fill="#f8faff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 匹配路径 -->
  <rect x="760" y="234" width="380" height="42" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="776" y="252" font-size="11" fill="#64748b">路径:</text>
  <text x="808" y="252" font-size="12" fill="#1e293b" font-family="'Consolas',monospace">$['address']['city']</text>
  <text x="776" y="268" font-size="11" fill="#64748b">值:</text>
  <text x="808" y="268" font-size="13" fill="#3b82f6" font-family="'Consolas',monospace" font-weight="600">"北京"</text>

  <!-- 结果详情 -->
  <rect x="760" y="292" width="380" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="776" y="312" font-size="11" fill="#64748b">类型:</text>
  <text x="810" y="312" font-size="11" fill="#3b82f6" font-family="'Consolas',monospace">string</text>
  <text x="870" y="312" font-size="11" fill="#64748b">长度:</text>
  <text x="904" y="312" font-size="11" fill="#1e293b" font-family="'Consolas',monospace">2</text>

  <!-- 高亮JSON片段 -->
  <text x="760" y="352" font-size="11" fill="#94a3b8" font-weight="600">匹配位置高亮</text>
  <rect x="760" y="362" width="380" height="100" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="776" y="382" font-size="11" fill="#1e293b" font-family="'Consolas',monospace">{</text>
  <text x="788" y="398" font-size="11" fill="#64748b" font-family="'Consolas',monospace">"address"</text>
  <text x="856" y="398" font-size="11" fill="#1e293b" font-family="'Consolas',monospace">: {</text>
  <!-- 高亮 city -->
  <rect x="788" y="404" width="160" height="18" rx="2" fill="#fef3c7"/>
  <text x="804" y="416" font-size="11" fill="#64748b" font-family="'Consolas',monospace">"city"</text>
  <text x="844" y="416" font-size="11" fill="#1e293b" font-family="'Consolas',monospace">:</text>
  <text x="852" y="416" font-size="11" fill="#3b82f6" font-family="'Consolas',monospace" font-weight="bold">"北京"</text>
  <text x="788" y="434" font-size="11" fill="#64748b" font-family="'Consolas',monospace">"zip"</text>
  <text x="824" y="434" font-size="11" fill="#1e293b" font-family="'Consolas',monospace">: "100000"</text>
  <text x="776" y="450" font-size="11" fill="#1e293b" font-family="'Consolas',monospace">  }</text>

  <!-- 结果操作 -->
  <rect x="760" y="480" width="80" height="28" rx="5" fill="url(#primaryBtn)"/>
  <text x="778" y="498" font-size="11" fill="#ffffff">复制值</text>
  <rect x="852" y="480" width="80" height="28" rx="5" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="868" y="498" font-size="11" fill="#475569">复制路径</text>
</svg>