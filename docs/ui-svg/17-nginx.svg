<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- 外框 -->
  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏背景 -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>

  <!-- 搜索框 -->
  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 分类 -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>
  <rect x="8" y="120" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="140" font-size="12" fill="#475569">Hex 转换</text>
  <rect x="8" y="154" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="174" font-size="12" fill="#475569">Base64 编解码</text>
  <rect x="8" y="188" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="208" font-size="12" fill="#475569">ASCII 转换</text>
  <rect x="8" y="222" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="242" font-size="12" fill="#475569">URL 编解码</text>
  <rect x="8" y="256" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="276" font-size="12" fill="#475569">Unicode 编解码</text>

  <!-- JSON 工具 分类 -->
  <text x="16" y="312" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">JSON 工具</text>
  <rect x="8" y="320" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="340" font-size="12" fill="#475569">Pretty 格式化</text>
  <rect x="8" y="354" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="374" font-size="12" fill="#475569">JSON 压缩</text>
  <rect x="8" y="388" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="408" font-size="12" fill="#475569">反序列化</text>
  <rect x="8" y="422" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="442" font-size="12" fill="#475569">JSONPath 查询</text>

  <!-- 加密解密 分类 -->
  <text x="16" y="478" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">加密解密</text>
  <rect x="8" y="486" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="506" font-size="12" fill="#475569">AES 加密/解密</text>
  <rect x="8" y="522" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="542" font-size="12" fill="#475569">DES / 3DES</text>
  <rect x="8" y="556" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="576" font-size="12" fill="#475569">RSA 工具</text>
  <rect x="8" y="590" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="610" font-size="12" fill="#475569">哈希摘要</text>
  <rect x="8" y="624" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="644" font-size="12" fill="#475569">密钥工具</text>

  <!-- 其他工具 分类 -->
  <text x="16" y="680" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">其他工具</text>
  <rect x="8" y="688" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="708" font-size="12" fill="#475569">二维码</text>
  <rect x="8" y="722" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="742" font-size="12" fill="#475569">HTTP Client</text>
  <!-- Nginx 选中态 -->
  <rect x="8" y="756" width="224" height="32" rx="6" fill="#eff6ff"/>
  <rect x="8" y="756" width="3" height="32" rx="1" fill="#3b82f6"/>
  <text x="24" y="776" font-size="12" fill="#2563eb" font-weight="500">Nginx</text>

  <!-- 内容区背景 -->
  <rect x="240" y="40" width="960" height="760" fill="#ffffff"/>

  <!-- 面包屑导航 -->
  <text x="268" y="70" font-size="12" fill="#94a3b8">其他工具</text>
  <text x="334" y="70" font-size="12" fill="#cbd5e1">/</text>
  <text x="346" y="70" font-size="12" fill="#1e293b" font-weight="500">Nginx 配置工具</text>

  <!-- Tab 切换: 格式化(选中) | 校验 | 模板 -->
  <rect x="276" y="88" width="80" height="32" rx="6" fill="url(#primaryBtn)"/>
  <text x="298" y="108" font-size="13" fill="#ffffff" font-weight="500">格式化</text>
  <rect x="364" y="88" width="60" height="32" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="108" font-size="13" fill="#64748b">校验</text>
  <rect x="432" y="88" width="60" height="32" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="448" y="108" font-size="13" fill="#64748b">模板</text>

  <!-- 格式化 Tab 内容 -->
  <!-- 左右分栏 -->
  <!-- 左侧: 原始配置 -->
  <rect x="260" y="130" width="440" height="590" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="260" y="130" width="440" height="32" rx="8" fill="#f8fafc"/>
  <rect x="260" y="148" width="440" height="14" fill="#f8fafc"/>
  <text x="278" y="152" font-size="12" fill="#64748b" font-weight="500">原始配置</text>

  <text x="278" y="184" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">server{listen 80;server_name example.com;</text>
  <text x="278" y="202" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">location / {proxy_pass http://backend;</text>
  <text x="278" y="220" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">proxy_set_header Host $host;</text>
  <text x="278" y="238" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">proxy_set_header X-Real-IP $remote_addr;</text>
  <text x="278" y="256" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">proxy_set_header X-Forwarded-For</text>
  <text x="278" y="274" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">$proxy_add_x_forwarded_for;}</text>
  <text x="278" y="292" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">location /static/{alias /var/www/static/;</text>
  <text x="278" y="310" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">expires 30d;}}</text>

  <!-- 右侧: 格式化结果 -->
  <rect x="712" y="130" width="456" height="590" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="712" y="130" width="456" height="32" rx="8" fill="#f8fafc"/>
  <rect x="712" y="148" width="456" height="14" fill="#f8fafc"/>
  <text x="730" y="152" font-size="12" fill="#64748b" font-weight="500">格式化结果</text>
  <!-- 复制按钮 -->
  <rect x="1120" y="136" width="34" height="22" rx="4" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1127" y="152" font-size="10" fill="#64748b">复制</text>

  <text x="730" y="184" font-size="11" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">server {</text>
  <text x="750" y="202" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">listen       80;</text>
  <text x="750" y="220" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">server_name  example.com;</text>
  <text x="750" y="238" font-size="11" fill="#64748b" font-family="Consolas, 'Courier New', monospace"> </text>
  <text x="750" y="256" font-size="11" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">location / {</text>
  <text x="770" y="274" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">proxy_pass         http://backend;</text>
  <text x="770" y="292" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">proxy_set_header   Host $host;</text>
  <text x="770" y="310" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">proxy_set_header   X-Real-IP</text>
  <text x="770" y="328" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">                  $remote_addr;</text>
  <text x="770" y="346" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">proxy_set_header   X-Forwarded-For</text>
  <text x="770" y="364" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">                  $proxy_add_x_forwarded_for;</text>
  <text x="750" y="382" font-size="11" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">}</text>
  <text x="750" y="400" font-size="11" fill="#64748b" font-family="Consolas, 'Courier New', monospace"> </text>
  <text x="750" y="418" font-size="11" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">location /static/ {</text>
  <text x="770" y="436" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">alias  /var/www/static/;</text>
  <text x="770" y="454" font-size="11" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">expires 30d;</text>
  <text x="750" y="472" font-size="11" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">}</text>
  <text x="730" y="490" font-size="11" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">}</text>
</svg>
