<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏 -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>

  <!-- 搜索框 -->
  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 选中 Hex -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>

  <rect x="8" y="120" width="224" height="32" rx="6" fill="#eff6ff"/>
  <rect x="8" y="120" width="3" height="32" rx="1" fill="#3b82f6"/>
  <text x="24" y="140" font-size="12" fill="#2563eb" font-weight="500">Hex 转换</text>

  <rect x="8" y="154" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="174" font-size="12" fill="#475569">Base64 编解码</text>

  <rect x="8" y="188" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="208" font-size="12" fill="#475569">ASCII 转换</text>

  <rect x="8" y="222" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="242" font-size="12" fill="#475569">URL 编解码</text>

  <rect x="8" y="256" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="276" font-size="12" fill="#475569">Unicode 编解码</text>

  <text x="16" y="312" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">JSON 工具</text>
  <rect x="8" y="320" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="340" font-size="12" fill="#475569">Pretty 格式化</text>
  <rect x="8" y="354" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="374" font-size="12" fill="#475569">JSON 压缩</text>
  <rect x="8" y="388" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="408" font-size="12" fill="#475569">反序列化</text>
  <rect x="8" y="422" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="442" font-size="12" fill="#475569">JSONPath 查询</text>

  <text x="16" y="478" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">加密解密</text>
  <rect x="8" y="486" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="506" font-size="12" fill="#475569">AES 加密/解密</text>
  <rect x="8" y="522" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="542" font-size="12" fill="#475569">DES / 3DES</text>
  <rect x="8" y="556" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="576" font-size="12" fill="#475569">RSA 工具</text>
  <rect x="8" y="590" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="610" font-size="12" fill="#475569">哈希摘要</text>
  <rect x="8" y="624" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="644" font-size="12" fill="#475569">密钥工具</text>

  <text x="16" y="680" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">数字计算</text>
  <rect x="8" y="688" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="708" font-size="12" fill="#475569">进制转换</text>
  <rect x="8" y="722" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="742" font-size="12" fill="#475569">公式求值</text>
  <rect x="8" y="756" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="776" font-size="12" fill="#475569">取模 / 整除</text>

  <!-- ========== 内容区 ========== -->
  <rect x="240" y="40" width="960" height="760" fill="#ffffff"/>

  <!-- 面包屑 -->
  <text x="268" y="70" font-size="12" fill="#94a3b8">字符编码</text>
  <text x="330" y="70" font-size="12" fill="#cbd5e1">/</text>
  <text x="342" y="70" font-size="12" fill="#1e293b" font-weight="500">Hex 转换</text>

  <!-- 工具面板卡片 -->
  <rect x="256" y="88" width="928" height="690" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Tab: 编码 / 解码 -->
  <rect x="276" y="104" width="80" height="32" rx="6" fill="url(#primaryBtn)"/>
  <text x="298" y="124" font-size="13" fill="#ffffff" font-weight="500">编码</text>
  <rect x="364" y="104" width="80" height="32" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="386" y="124" font-size="13" fill="#64748b">解码</text>

  <!-- 选项配置 -->
  <rect x="276" y="148" width="888" height="44" rx="8" fill="#f8fafc"/>
  <text x="292" y="175" font-size="12" fill="#64748b">分隔符</text>
  <rect x="340" y="158" width="100" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="352" y="176" font-size="11" fill="#1e293b">空格  ▾</text>

  <text x="460" y="175" font-size="12" fill="#64748b">前缀</text>
  <rect x="496" y="158" width="100" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="508" y="176" font-size="11" fill="#1e293b">无  ▾</text>

  <text x="616" y="175" font-size="12" fill="#64748b">大小写</text>
  <rect x="664" y="158" width="100" height="26" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="676" y="176" font-size="11" fill="#1e293b">大写  ▾</text>

  <!-- 输入区标题 -->
  <rect x="276" y="204" width="888" height="28" fill="#f8fafc"/>
  <line x1="276" y1="232" x2="1164" y2="232" stroke="#e2e8f0" stroke-width="1"/>
  <text x="292" y="222" font-size="12" fill="#64748b" font-weight="500">输入（字符串）</text>

  <!-- 输入编辑区 -->
  <rect x="276" y="232" width="888" height="200" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="276" y="232" width="30" height="200" fill="#f8fafc"/>
  <text x="284" y="256" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">1</text>
  <text x="284" y="279" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">2</text>
  <text x="284" y="302" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">3</text>
  <text x="284" y="325" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">4</text>
  <line x1="306" y1="232" x2="306" y2="432" stroke="#f1f5f9" stroke-width="1"/>
  <text x="316" y="256" font-size="13" fill="#1e293b" font-family="'Consolas', monospace">Hello World 你好世界</text>
  <text x="316" y="279" font-size="13" fill="#94a3b8" font-family="'Consolas', monospace">这是一段需要转换为Hex的测试文本</text>
  <text x="316" y="302" font-size="13" fill="#94a3b8" font-family="'Consolas', monospace">包含English和中文混合内容</text>

  <!-- 交换按钮 中间 -->
  <rect x="680" y="440" width="80" height="28" rx="14" fill="url(#primaryBtn)"/>
  <text x="700" y="458" font-size="11" fill="#ffffff">交换 ⇅</text>

  <!-- 输出区标题 -->
  <rect x="276" y="476" width="888" height="28" fill="#f8fafc"/>
  <line x1="276" y1="504" x2="1164" y2="504" stroke="#e2e8f0" stroke-width="1"/>
  <text x="292" y="494" font-size="12" fill="#64748b" font-weight="500">输出（Hex）</text>
  <rect x="1024" y="482" width="82" height="20" rx="4" fill="url(#primaryBtn)"/>
  <text x="1034" y="496" font-size="10" fill="#ffffff">紧凑复制</text>
  <rect x="1114" y="482" width="48" height="20" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1122" y="496" font-size="10" fill="#64748b">复制</text>

  <!-- 输出展示区 -->
  <rect x="276" y="504" width="888" height="200" fill="#f8faff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="276" y="504" width="30" height="200" fill="#f1f5f9"/>
  <text x="284" y="528" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">1</text>
  <text x="284" y="551" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">2</text>
  <text x="284" y="574" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">3</text>
  <text x="284" y="597" font-size="10" fill="#cbd5e1" font-family="'Consolas', monospace">4</text>
  <line x1="306" y1="504" x2="306" y2="704" stroke="#f1f5f9" stroke-width="1"/>
  <text x="316" y="528" font-size="13" fill="#3b82f6" font-family="'Consolas', monospace">48 65 6C 6C 6F 20 57 6F 72 6C 64 20 E4 BD A0 E5 A5 BD</text>
  <text x="316" y="551" font-size="13" fill="#3b82f6" font-family="'Consolas', monospace">E4 B8 96 E7 95 8C 20 E8 BF 99 E6 98 AF E4 B8 80 E6 AE</text>
  <text x="316" y="574" font-size="13" fill="#3b82f6" font-family="'Consolas', monospace">B5 E9 9C 80 E8 A6 81 E8 BD AC E6 8D A2 E4 B8 BA 48 65</text>
  <text x="316" y="597" font-size="13" fill="#3b82f6" font-family="'Consolas', monospace">78 E7 9A 84 E6 B5 8B E8 AF 95 E6 96 87 E6 9C AC</text>
  <!-- 紧凑复制提示 -->
  <text x="316" y="630" font-size="10" fill="#94a3b8" font-style="italic">紧凑复制: 48656C6C6F20...（自动去除空格）</text>

  <!-- 历史记录 -->
  <rect x="276" y="720" width="888" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="292" y="740" font-size="11" fill="#94a3b8" font-weight="500">历史记录（最近 5 条）</text>
  <text x="1132" y="740" font-size="11" fill="#cbd5e1">清除</text>
  <rect x="292" y="748" width="180" height="16" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="760" font-size="9" fill="#94a3b8">编码 | Hello World → 48 65 6C...</text>
  <rect x="484" y="748" width="180" height="16" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="492" y="760" font-size="9" fill="#94a3b8">解码 | 48 65 6C 6C 6F → Hello</text>
</svg>
