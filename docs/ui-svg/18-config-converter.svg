<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- 外框 -->
  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏背景 -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>

  <!-- 搜索框 -->
  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 分类 -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>
  <rect x="8" y="120" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="140" font-size="12" fill="#475569">Hex 转换</text>
  <rect x="8" y="154" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="174" font-size="12" fill="#475569">Base64 编解码</text>
  <rect x="8" y="188" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="208" font-size="12" fill="#475569">ASCII 转换</text>
  <rect x="8" y="222" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="242" font-size="12" fill="#475569">URL 编解码</text>
  <rect x="8" y="256" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="276" font-size="12" fill="#475569">Unicode 编解码</text>

  <!-- JSON 工具 分类 -->
  <text x="16" y="312" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">JSON 工具</text>
  <rect x="8" y="320" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="340" font-size="12" fill="#475569">Pretty 格式化</text>
  <rect x="8" y="354" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="374" font-size="12" fill="#475569">JSON 压缩</text>
  <rect x="8" y="388" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="408" font-size="12" fill="#475569">反序列化</text>
  <rect x="8" y="422" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="442" font-size="12" fill="#475569">JSONPath 查询</text>

  <!-- 加密解密 分类 -->
  <text x="16" y="478" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">加密解密</text>
  <rect x="8" y="486" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="506" font-size="12" fill="#475569">AES 加密/解密</text>
  <rect x="8" y="522" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="542" font-size="12" fill="#475569">DES / 3DES</text>
  <rect x="8" y="556" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="576" font-size="12" fill="#475569">RSA 工具</text>
  <rect x="8" y="590" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="610" font-size="12" fill="#475569">哈希摘要</text>
  <rect x="8" y="624" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="644" font-size="12" fill="#475569">密钥工具</text>

  <!-- 其他工具 分类 -->
  <text x="16" y="680" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">其他工具</text>
  <rect x="8" y="688" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="708" font-size="12" fill="#475569">二维码</text>
  <rect x="8" y="722" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="742" font-size="12" fill="#475569">HTTP Client</text>
  <rect x="8" y="756" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="776" font-size="12" fill="#475569">Nginx</text>

  <!-- 配置转换 选中态 - 因为侧边栏空间有限,使用滚动方式显示,当前可见区显示配置转换高亮 -->
  <!-- 注意: 在实际应用中侧边栏可以滚动,这里简化显示 -->

  <!-- 内容区背景 -->
  <rect x="240" y="40" width="960" height="760" fill="#ffffff"/>

  <!-- 面包屑导航 -->
  <text x="268" y="70" font-size="12" fill="#94a3b8">其他工具</text>
  <text x="334" y="70" font-size="12" fill="#cbd5e1">/</text>
  <text x="346" y="70" font-size="12" fill="#1e293b" font-weight="500">配置文件转换</text>

  <!-- 转换方向选择 -->
  <rect x="260" y="88" width="908" height="48" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="278" y="118" font-size="12" fill="#64748b" font-weight="500">转换方向:</text>

  <!-- Properties to YAML (选中) -->
  <rect x="370" y="100" width="140" height="28" rx="14" fill="url(#primaryBtn)"/>
  <text x="392" y="118" font-size="11" fill="#ffffff" font-weight="500">Properties → YAML</text>

  <!-- YAML to Properties -->
  <rect x="520" y="100" width="140" height="28" rx="14" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="536" y="118" font-size="11" fill="#64748b">YAML → Properties</text>

  <!-- Properties to JSON -->
  <rect x="670" y="100" width="130" height="28" rx="14" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="686" y="118" font-size="11" fill="#64748b">Properties → JSON</text>

  <!-- JSON to Properties -->
  <rect x="810" y="100" width="130" height="28" rx="14" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="826" y="118" font-size="11" fill="#64748b">JSON → Properties</text>

  <!-- 左侧: 源文件 -->
  <rect x="260" y="148" width="440" height="540" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="260" y="148" width="440" height="32" rx="8" fill="#f8fafc"/>
  <rect x="260" y="166" width="440" height="14" fill="#f8fafc"/>
  <text x="278" y="170" font-size="12" fill="#64748b" font-weight="500">源文件 (Properties)</text>

  <text x="278" y="200" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">server.port=8080</text>
  <text x="278" y="220" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">server.address=0.0.0.0</text>
  <text x="278" y="240" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace"> </text>
  <text x="278" y="260" font-size="12" fill="#64748b" font-family="Consolas, 'Courier New', monospace"># Database Config</text>
  <text x="278" y="280" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">spring.datasource.url=jdbc:mysql://localhost/db</text>
  <text x="278" y="300" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">spring.datasource.username=root</text>
  <text x="278" y="320" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">spring.datasource.password=secret</text>
  <text x="278" y="340" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver</text>
  <text x="278" y="360" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace"> </text>
  <text x="278" y="380" font-size="12" fill="#64748b" font-family="Consolas, 'Courier New', monospace"># JPA Config</text>
  <text x="278" y="400" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">spring.jpa.show-sql=true</text>
  <text x="278" y="420" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">spring.jpa.hibernate.ddl-auto=update</text>

  <!-- 右侧: 转换结果 -->
  <rect x="712" y="148" width="456" height="540" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="712" y="148" width="456" height="32" rx="8" fill="#f8fafc"/>
  <rect x="712" y="166" width="456" height="14" fill="#f8fafc"/>
  <text x="730" y="170" font-size="12" fill="#64748b" font-weight="500">转换结果 (YAML)</text>

  <!-- 复制+下载按钮 -->
  <rect x="1048" y="154" width="34" height="22" rx="4" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1055" y="170" font-size="10" fill="#64748b">复制</text>
  <rect x="1090" y="154" width="34" height="22" rx="4" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1097" y="170" font-size="10" fill="#64748b">下载</text>

  <text x="730" y="200" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">server:</text>
  <text x="750" y="220" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">port: 8080</text>
  <text x="750" y="240" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">address: 0.0.0.0</text>
  <text x="730" y="260" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace"> </text>
  <text x="730" y="280" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">spring:</text>
  <text x="750" y="300" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">datasource:</text>
  <text x="770" y="320" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">url: jdbc:mysql://localhost/db</text>
  <text x="770" y="340" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">username: root</text>
  <text x="770" y="360" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">password: secret</text>
  <text x="770" y="380" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">driver-class-name: com.mysql.cj.jdbc.Driver</text>
  <text x="750" y="400" font-size="12" fill="#3b82f6" font-family="Consolas, 'Courier New', monospace">jpa:</text>
  <text x="770" y="420" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">show-sql: true</text>
  <text x="770" y="440" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">hibernate:</text>
  <text x="790" y="460" font-size="12" fill="#1e293b" font-family="Consolas, 'Courier New', monospace">ddl-auto: update</text>

  <!-- 底部校验状态 -->
  <rect x="260" y="700" width="908" height="36" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="284" cy="718" r="8" fill="#22c55e"/>
  <polyline points="280,718 283,721 288,715" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="300" y="723" font-size="12" fill="#16a34a" font-weight="500">格式正确 - Properties 文件解析成功，已转换为 YAML 格式</text>
</svg>
