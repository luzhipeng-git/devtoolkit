  <rect x="504" y="80" width="120" height="36" fill="#ffffff"/>
  <text x="542" y="103" font-size="13" fill="#475569">签名验签</text>

  <!-- 密钥生成 Tab 内容 -->
  <!-- 密钥长度选择 -->
  <text x="264" y="148" font-size="13" fill="#1e293b" font-weight="600">密钥长度</text>
  <rect x="264" y="158" width="600" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
