  <text x="284" y="618" font-size="12" fill="#92400e" font-weight="500">安全提示</text>
  <text x="356" y="618" font-size="11" fill="#a16207">请妥善保管私钥，不要在不安全的环境中传输或存储。建议使用 2048 位及以上密钥长度以确保安全性。</text>

  <!-- 密钥信息摘要 -->
  <rect x="264" y="658" width="920" height="110" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="684" font-size="12" fill="#1e293b" font-weight="600">密钥信息</text>
  <line x1="264" y1="692" x2="1184" y2="692" stroke="#e2e8f0" stroke-width="1"/>
