  <circle cx="290" cy="178" r="4" fill="#d0d5dd"/>
  <text x="306" y="183" font-size="13" fill="#475569">1024</text>
  <!-- 2048 单选 选中 -->
  <circle cx="370" cy="178" r="8" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
