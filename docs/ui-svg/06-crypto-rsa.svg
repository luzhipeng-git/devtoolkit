  <text x="24" y="542" font-size="12" fill="#475569">DES / 3DES</text>
  <!-- RSA 工具 选中 -->
  <rect x="8" y="556" width="224" height="32" rx="6" fill="#eff6ff"/>
  <rect x="8" y="556" width="3" height="32" rx="1" fill="#3b82f6"/>
  <text x="24" y="576" font-size="12" fill="#2563eb" font-weight="500">RSA 工具</text>
  <rect x="8" y="590" width="224" height="32" rx="6" fill="transparent"/>
