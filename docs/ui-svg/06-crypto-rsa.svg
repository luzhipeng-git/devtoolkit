  <text x="24" y="742" font-size="12" fill="#475569">计算器</text>

  <!-- 主内容区 -->
  <!-- 面包屑 -->
  <text x="264" y="66" font-size="12" fill="#94a3b8">加密解密</text>
  <text x="328" y="66" font-size="12" fill="#94a3b8">/</text>
  <text x="340" y="66" font-size="12" fill="#1e293b" font-weight="500">RSA 工具</text>

