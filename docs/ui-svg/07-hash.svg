<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏 -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>

  <!-- 搜索框 -->
  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>
  <rect x="8" y="120" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="140" font-size="12" fill="#475569">Hex 转换</text>
  <rect x="8" y="154" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="174" font-size="12" fill="#475569">Base64 编解码</text>
  <rect x="8" y="188" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="208" font-size="12" fill="#475569">ASCII 转换</text>
  <rect x="8" y="222" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="242" font-size="12" fill="#475569">URL 编解码</text>
  <rect x="8" y="256" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="276" font-size="12" fill="#475569">Unicode 编解码</text>

  <!-- JSON 工具 -->
  <text x="16" y="312" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">JSON 工具</text>
  <rect x="8" y="320" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="340" font-size="12" fill="#475569">Pretty 格式化</text>
  <rect x="8" y="354" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="374" font-size="12" fill="#475569">JSON 压缩</text>
  <rect x="8" y="388" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="408" font-size="12" fill="#475569">反序列化</text>
  <rect x="8" y="422" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="442" font-size="12" fill="#475569">JSONPath 查询</text>

  <!-- 加密解密 (哈希摘要 选中) -->
  <text x="16" y="478" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">加密解密</text>
  <rect x="8" y="486" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="506" font-size="12" fill="#475569">AES 加密/解密</text>
  <rect x="8" y="522" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="542" font-size="12" fill="#475569">DES / 3DES</text>
  <rect x="8" y="556" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="576" font-size="12" fill="#475569">RSA 工具</text>
  <!-- 哈希摘要 选中 -->
  <rect x="8" y="590" width="224" height="32" rx="6" fill="#eff6ff"/>
  <rect x="8" y="590" width="3" height="32" rx="1" fill="#3b82f6"/>
  <text x="24" y="610" font-size="12" fill="#2563eb" font-weight="500">哈希摘要</text>
  <rect x="8" y="624" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="644" font-size="12" fill="#475569">密钥工具</text>

  <!-- 数字计算 -->
  <text x="16" y="680" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">数字计算</text>
  <rect x="8" y="688" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="708" font-size="12" fill="#475569">进制转换</text>
  <rect x="8" y="722" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="742" font-size="12" fill="#475569">计算器</text>

  <!-- 主内容区 -->
  <!-- 面包屑 -->
  <text x="264" y="66" font-size="12" fill="#94a3b8">加密解密</text>
  <text x="328" y="66" font-size="12" fill="#94a3b8">/</text>
  <text x="340" y="66" font-size="12" fill="#1e293b" font-weight="500">哈希摘要</text>

  <!-- 算法选择行 -->
  <rect x="264" y="80" width="920" height="44" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="108" font-size="13" fill="#1e293b" font-weight="600">算法：</text>
  <!-- MD5 -->
  <rect x="336" y="92" width="56" height="28" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="348" y="111" font-size="12" fill="#475569">MD5</text>
  <!-- SHA-1 -->
  <rect x="400" y="92" width="64" height="28" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="410" y="111" font-size="12" fill="#475569">SHA-1</text>
  <!-- SHA-256 选中 -->
  <rect x="472" y="92" width="80" height="28" rx="6" fill="#3b82f6" stroke="none"/>
  <text x="484" y="111" font-size="12" fill="#ffffff" font-weight="500">SHA-256</text>
  <!-- SHA-384 -->
  <rect x="560" y="92" width="80" height="28" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="572" y="111" font-size="12" fill="#475569">SHA-384</text>
  <!-- SHA-512 -->
  <rect x="648" y="92" width="80" height="28" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="660" y="111" font-size="12" fill="#475569">SHA-512</text>
  <!-- HMAC -->
  <rect x="736" y="92" width="68" height="28" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="748" y="111" font-size="12" fill="#475569">HMAC</text>

  <!-- 输入区 -->
  <text x="264" y="152" font-size="13" fill="#1e293b" font-weight="600">输入</text>
  <rect x="264" y="162" width="920" height="160" rx="8" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <!-- 文本输入框 -->
  <text x="280" y="190" font-size="13" fill="#1e293b">Hello World</text>
  <line x1="280" y1="198" x2="1160" y2="198" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <!-- 拖拽文件提示 -->
  <rect x="600" y="260" width="200" height="40" rx="8" fill="#f8fafc" stroke="#d0d5dd" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="638" y="285" font-size="12" fill="#94a3b8">拖拽文件到此处</text>
  <!-- 或者 -->
  <text x="264" y="340" font-size="12" fill="#94a3b8">支持文本输入或拖拽文件计算哈希值</text>

  <!-- 计算按钮 -->
  <rect x="1096" y="336" width="88" height="34" rx="8" fill="url(#primaryBtn)"/>
  <text x="1118" y="358" font-size="13" fill="#ffffff" font-weight="500">计算</text>

  <!-- 输出区 标题 -->
  <text x="264" y="396" font-size="13" fill="#1e293b" font-weight="600">计算结果</text>

  <!-- SHA-256 result card (selected algorithm) -->
  <rect x="264" y="410" width="920" height="100" rx="8" fill="#f8faff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="280" y="440" font-size="13" fill="#2563eb" font-weight="600">SHA-256</text>
  <text x="280" y="464" font-size="12" fill="#2563eb" font-family="'Consolas',monospace">a591a6d40bf420404a011733cfb7b190d62c4158966e5bbd7a16ca6e3c8acc55</text>
  <text x="280" y="486" font-size="11" fill="#94a3b8">64 字符 / 256 bit</text>
  <!-- copy button -->
  <rect x="1106" y="424" width="60" height="28" rx="6" fill="#3b82f6" stroke="none"/>
  <text x="1118" y="443" font-size="12" fill="#ffffff" font-weight="500">复制</text>

  <!-- link: view other algorithm results -->
  <text x="264" y="536" font-size="12" fill="#3b82f6" text-decoration="underline">查看其他算法结果 ▾</text>

  <!-- bottom info -->
  <rect x="264" y="556" width="920" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="580" font-size="11" fill="#64748b">提示：点击算法标签可快速切换，支持计算多种算法的哈希值。也可拖拽文件到输入区直接计算文件哈希。</text>
  <text x="280" y="598" font-size="11" fill="#94a3b8">MD5 和 SHA-1 已不推荐用于安全场景，建议使用 SHA-256 及以上算法。</text>

  <!-- input area scrollbar -->
  <rect x="1178" y="162" width="6" height="160" rx="3" fill="#f1f5f9"/>
  <rect x="1178" y="172" width="6" height="64" rx="3" fill="#cbd5e1"/>
</svg>