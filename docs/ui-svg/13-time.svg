<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- 外框 -->
  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏 -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>

  <!-- 搜索框 -->
  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 分类 -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>
  <rect x="8" y="120" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="140" font-size="12" fill="#475569">Hex 转换</text>
  <rect x="8" y="154" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="174" font-size="12" fill="#475569">Base64 编解码</text>
  <rect x="8" y="188" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="208" font-size="12" fill="#475569">URL 编解码</text>

  <!-- 其他工具 分类 -->
  <text x="16" y="250" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">其他工具</text>

  <!-- 时间计算 子分类 -->
  <rect x="8" y="258" width="224" height="32" rx="6" fill="#eff6ff"/>
  <rect x="8" y="258" width="3" height="32" rx="1" fill="#3b82f6"/>
  <text x="24" y="278" font-size="12" fill="#2563eb" font-weight="500">时间戳转换</text>

  <rect x="8" y="292" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="312" font-size="12" fill="#475569">Cron 表达式</text>
  <rect x="8" y="326" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="346" font-size="12" fill="#475569">正则调试</text>
  <rect x="8" y="360" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="380" font-size="12" fill="#475569">Grok 调试</text>

  <!-- 数字计算 分类 -->
  <text x="16" y="418" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">数字计算</text>
  <rect x="8" y="426" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="446" font-size="12" fill="#475569">进制转换</text>
  <rect x="8" y="460" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="480" font-size="12" fill="#475569">公式求值</text>

  <!-- 内容区 -->
  <rect x="240" y="40" width="960" height="760" fill="#ffffff"/>

  <!-- 面包屑 -->
  <text x="268" y="70" font-size="12" fill="#94a3b8">时间计算</text>
  <text x="338" y="70" font-size="12" fill="#cbd5e1">/</text>
  <text x="350" y="70" font-size="12" fill="#1e293b" font-weight="500">时间戳转换</text>

  <!-- ========== 区1: 时间戳转日期 ========== -->
  <rect x="256" y="88" width="928" height="228" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="114" font-size="14" fill="#1e293b" font-weight="600">时间戳转日期</text>

  <!-- 输入框 -->
  <rect x="280" y="128" width="700" height="38" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="296" y="152" font-size="13" fill="#94a3b8">输入时间戳（毫秒/秒自动识别）</text>

  <!-- 转换按钮 -->
  <rect x="990" y="128" width="76" height="38" rx="6" fill="url(#primaryBtn)"/>
  <text x="1010" y="152" font-size="13" fill="#ffffff" font-weight="500">转换</text>

  <!-- 结果卡片 -->
  <rect x="280" y="178" width="928" height="56" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="296" y="200" font-size="12" fill="#64748b">可读日期</text>
  <text x="370" y="200" font-size="16" fill="#3b82f6" font-weight="600" font-family="Consolas, monospace">2026-04-22 14:30:00.123</text>
  <rect x="1060" y="188" width="52" height="24" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1072" y="204" font-size="10" fill="#64748b">复制</text>
  <text x="1130" y="200" font-size="10" fill="#94a3b8" font-style="italic">秒级</text>

  <!-- 格式 Pattern -->
  <text x="280" y="258" font-size="11" fill="#64748b">格式 Pattern</text>
  <rect x="370" y="244" width="280" height="28" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="382" y="263" font-size="12" fill="#1e293b" font-family="Consolas, monospace">yyyy-MM-dd HH:mm:ss.SSS</text>

  <!-- 当前时间戳实时显示 -->
  <text x="700" y="263" font-size="10" fill="#94a3b8">当前时间戳：</text>
  <text x="780" y="263" font-size="11" fill="#3b82f6" font-family="Consolas, monospace">1745303400123</text>
  <circle cx="740" cy="259" r="4" fill="#28c840"/>
  <text x="748" y="263" font-size="10" fill="#28c840">实时</text>

  <!-- ========== 区2: 日期转时间戳 ========== -->
  <rect x="256" y="330" width="928" height="210" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="356" font-size="14" fill="#1e293b" font-weight="600">日期转时间戳</text>

  <!-- 日期选择器输入框 -->
  <rect x="280" y="370" width="360" height="38" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="296" y="394" font-size="13" fill="#1e293b">2026-04-22</text>
  <!-- 日历图标 -->
  <rect x="612" y="376" width="18" height="18" rx="3" fill="none" stroke="#64748b" stroke-width="1"/>
  <line x1="616" y1="374" x2="616" y2="378" stroke="#64748b" stroke-width="1"/>
  <line x1="626" y1="374" x2="626" y2="378" stroke="#64748b" stroke-width="1"/>
  <text x="615" y="390" font-size="9" fill="#64748b">22</text>

  <!-- 时间输入 -->
  <rect x="660" y="370" width="180" height="38" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="676" y="394" font-size="13" fill="#1e293b">14:30:00</text>

  <!-- 转换按钮 -->
  <rect x="858" y="370" width="76" height="38" rx="6" fill="url(#primaryBtn)"/>
  <text x="878" y="394" font-size="13" fill="#ffffff" font-weight="500">转换</text>

  <!-- 转换结果 -->
  <rect x="280" y="420" width="440" height="56" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="296" y="444" font-size="11" fill="#64748b">秒级时间戳</text>
  <text x="392" y="444" font-size="16" fill="#3b82f6" font-weight="600" font-family="Consolas, monospace">1745303400</text>
  <rect x="640" y="430" width="52" height="24" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="652" y="446" font-size="10" fill="#64748b">复制</text>

  <rect x="740" y="420" width="440" height="56" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="756" y="444" font-size="11" fill="#64748b">毫秒级时间戳</text>
  <text x="866" y="444" font-size="16" fill="#3b82f6" font-weight="600" font-family="Consolas, monospace">1745303400000</text>
  <rect x="1100" y="430" width="52" height="24" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1112" y="446" font-size="10" fill="#64748b">复制</text>

  <!-- ========== 区3: 时间推算 ========== -->
  <rect x="256" y="554" width="928" height="230" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="580" font-size="14" fill="#1e293b" font-weight="600">时间推算</text>

  <!-- Tab: 时间戳输入 / 日期选择 -->
  <rect x="420" y="564" width="100" height="26" rx="6" fill="url(#primaryBtn)"/>
  <text x="436" y="581" font-size="11" fill="#ffffff">时间戳输入</text>
  <rect x="528" y="564" width="86" height="26" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="544" y="581" font-size="11" fill="#64748b">日期选择</text>

  <!-- 时间戳输入框 -->
  <rect x="280" y="600" width="300" height="36" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="296" y="623" font-size="13" fill="#94a3b8">输入基准时间戳...</text>

  <!-- 操作: +/- 天/时/分/秒 -->
  <text x="280" y="660" font-size="12" fill="#64748b">操作</text>

  <!-- +/- 切换 -->
  <rect x="320" y="646" width="32" height="28" rx="4" fill="#3b82f6"/>
  <text x="331" y="665" font-size="14" fill="#ffffff" font-weight="bold">+</text>
  <rect x="356" y="646" width="32" height="28" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="367" y="665" font-size="14" fill="#475569">-</text>

  <!-- 天 -->
  <rect x="410" y="646" width="80" height="28" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="422" y="665" font-size="12" fill="#1e293b">7</text>
  <text x="478" y="665" font-size="11" fill="#64748b">天</text>

  <!-- 时 -->
  <rect x="510" y="646" width="80" height="28" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="522" y="665" font-size="12" fill="#94a3b8">0</text>
  <text x="578" y="665" font-size="11" fill="#64748b">时</text>

  <!-- 分 -->
  <rect x="610" y="646" width="80" height="28" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="622" y="665" font-size="12" fill="#94a3b8">0</text>
  <text x="678" y="665" font-size="11" fill="#64748b">分</text>

  <!-- 秒 -->
  <rect x="710" y="646" width="80" height="28" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="722" y="665" font-size="12" fill="#94a3b8">0</text>
  <text x="778" y="665" font-size="11" fill="#64748b">秒</text>

  <!-- 推算按钮 -->
  <rect x="990" y="646" width="76" height="38" rx="6" fill="url(#primaryBtn)"/>
  <text x="1010" y="670" font-size="13" fill="#ffffff" font-weight="500">推算</text>

  <!-- 推算结果 -->
  <rect x="280" y="694" width="928" height="56" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="296" y="718" font-size="11" fill="#64748b">目标时间戳</text>
  <text x="392" y="718" font-size="14" fill="#3b82f6" font-weight="600" font-family="Consolas, monospace">1745908200000</text>
  <text x="296" y="738" font-size="11" fill="#64748b">可读日期</text>
  <text x="370" y="738" font-size="14" fill="#3b82f6" font-weight="600" font-family="Consolas, monospace">2026-04-29 14:30:00.000</text>
  <rect x="1100" y="708" width="52" height="24" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1112" y="724" font-size="10" fill="#64748b">复制</text>

  <!-- 当前时间戳显示（底部） -->
  <text x="280" y="770" font-size="10" fill="#94a3b8">当前系统时间戳（毫秒）：</text>
  <text x="430" y="770" font-size="11" fill="#3b82f6" font-family="Consolas, monospace">1745303400123</text>
  <text x="580" y="770" font-size="10" fill="#94a3b8">=</text>
  <text x="594" y="770" font-size="11" fill="#64748b" font-family="Consolas, monospace">2026-04-22 14:30:00</text>
</svg>
