<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- 外框 -->
  <rect x="0" y="0" width="1200" height="800" rx="8" fill="#ffffff" stroke="#d8dce6" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1200" height="40" rx="8" fill="#ffffff"/>
  <rect x="0" y="20" width="1200" height="20" fill="#ffffff"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="80" y="9" width="22" height="22" rx="5" fill="url(#primaryBtn)"/>
  <text x="85" y="24" font-size="11" fill="#ffffff" font-weight="bold">DT</text>
  <text x="112" y="25" font-size="14" fill="#1e293b" font-weight="600">DevToolkit</text>
  <text x="200" y="25" font-size="11" fill="#94a3b8">v1.0.0</text>
  <text x="1134" y="25" font-size="14" fill="#94a3b8">-</text>
  <rect x="1156" y="12" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1.2" rx="1"/>
  <text x="1178" y="26" font-size="16" fill="#94a3b8">x</text>

  <!-- 侧边栏 -->
  <rect x="0" y="40" width="240" height="760" fill="url(#sidebarBg)"/>
  <line x1="240" y1="40" x2="240" y2="800" stroke="#e8eaef" stroke-width="1"/>
  <rect x="222" y="48" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#d0d5dd" stroke-width="1"/>
  <text x="224" y="59" font-size="9" fill="#64748b">&lt;</text>

  <!-- 搜索框 -->
  <rect x="12" y="52" width="204" height="34" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="26" y="74" font-size="12" fill="#94a3b8">搜索工具...</text>

  <!-- 字符编码 分类 -->
  <text x="16" y="112" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">字符编码</text>
  <rect x="8" y="120" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="140" font-size="12" fill="#475569">Hex 转换</text>
  <rect x="8" y="154" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="174" font-size="12" fill="#475569">Base64 编解码</text>
  <rect x="8" y="188" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="208" font-size="12" fill="#475569">URL 编解码</text>

  <!-- 其他工具 分类 -->
  <text x="16" y="250" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">其他工具</text>
  <rect x="8" y="258" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="278" font-size="12" fill="#475569">时间戳转换</text>
  <rect x="8" y="292" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="312" font-size="12" fill="#475569">Cron 表达式</text>

  <!-- 正则调试 选中 -->
  <rect x="8" y="326" width="224" height="32" rx="6" fill="#eff6ff"/>
  <rect x="8" y="326" width="3" height="32" rx="1" fill="#3b82f6"/>
  <text x="24" y="346" font-size="12" fill="#2563eb" font-weight="500">正则调试</text>

  <rect x="8" y="360" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="380" font-size="12" fill="#475569">Grok 调试</text>

  <!-- 数字计算 分类 -->
  <text x="16" y="418" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="0.5">数字计算</text>
  <rect x="8" y="426" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="446" font-size="12" fill="#475569">进制转换</text>
  <rect x="8" y="460" width="224" height="32" rx="6" fill="transparent"/>
  <text x="24" y="480" font-size="12" fill="#475569">公式求值</text>

  <!-- 内容区 -->
  <rect x="240" y="40" width="960" height="760" fill="#ffffff"/>

  <!-- 面包屑 -->
  <text x="268" y="70" font-size="12" fill="#94a3b8">正则表达式调试</text>

  <!-- ========== 顶部: 正则表达式输入 + flag ========== -->
  <rect x="256" y="88" width="928" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="110" font-size="12" fill="#64748b">正则表达式</text>

  <!-- 正则输入框 -->
  <rect x="370" y="96" width="620" height="32" rx="6" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="382" y="117" font-size="14" fill="#3b82f6" font-family="Consolas, monospace">(\d{3})-(\d{4})</text>
  <!-- 正则斜杠装饰 -->
  <text x="362" y="117" font-size="14" fill="#64748b" font-family="Consolas, monospace">/</text>

  <!-- flag 复选框 -->
  <text x="280" y="148" font-size="11" fill="#64748b">Flags</text>
  <!-- g 选中 -->
  <rect x="324" y="136" width="20" height="20" rx="3" fill="#3b82f6"/>
  <polyline points="328,147 332,151 339,141" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="350" y="150" font-size="12" fill="#1e293b">g</text>

  <rect x="370" y="136" width="20" height="20" rx="3" fill="#3b82f6"/>
  <polyline points="374,147 378,151 385,141" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="396" y="150" font-size="12" fill="#1e293b">i</text>

  <rect x="416" y="136" width="20" height="20" rx="3" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="442" y="150" font-size="12" fill="#475569">m</text>

  <rect x="462" y="136" width="20" height="20" rx="3" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="488" y="150" font-size="12" fill="#475569">s</text>

  <rect x="508" y="136" width="20" height="20" rx="3" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="534" y="150" font-size="12" fill="#475569">u</text>

  <!-- 匹配统计 -->
  <text x="1050" y="150" font-size="13" fill="#3b82f6" font-weight="600">3 个匹配</text>

  <!-- ========== 中部: 左右分栏 ========== -->
  <!-- 左侧: 测试文本 -->
  <rect x="256" y="172" width="540" height="310" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="256" y="172" width="540" height="28" rx="10" fill="#f8fafc"/>
  <rect x="256" y="192" width="540" height="8" fill="#f8fafc"/>
  <line x1="256" y1="200" x2="796" y2="200" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="190" font-size="12" fill="#64748b" font-weight="500">测试文本</text>

  <!-- 多行文本输入区 -->
  <rect x="268" y="208" width="516" height="264" fill="#ffffff"/>
  <text x="284" y="232" font-size="13" fill="#1e293b" font-family="Consolas, monospace">Call 555-1234 or 555-5678</text>
  <text x="284" y="256" font-size="13" fill="#1e293b" font-family="Consolas, monospace">for support. Also 800-9999</text>
  <text x="284" y="280" font-size="13" fill="#1e293b" font-family="Consolas, monospace">is available for help.</text>
  <text x="284" y="304" font-size="13" fill="#94a3b8" font-family="Consolas, monospace"></text>
  <text x="284" y="328" font-size="13" fill="#94a3b8" font-family="Consolas, monospace">Type more text here...</text>

  <!-- 右侧: 匹配结果 -->
  <rect x="808" y="172" width="376" height="310" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="808" y="172" width="376" height="28" rx="10" fill="#f8fafc"/>
  <rect x="808" y="192" width="376" height="8" fill="#f8fafc"/>
  <line x1="808" y1="200" x2="1184" y2="200" stroke="#e2e8f0" stroke-width="1"/>
  <text x="832" y="190" font-size="12" fill="#64748b" font-weight="500">匹配结果</text>

  <!-- 匹配高亮文本 -->
  <text x="824" y="232" font-size="13" fill="#94a3b8" font-family="Consolas, monospace">Call </text>
  <!-- 高亮匹配1 -->
  <rect x="862" y="218" width="64" height="18" rx="3" fill="#dbeafe"/>
  <text x="862" y="232" font-size="13" fill="#3b82f6" font-weight="600" font-family="Consolas, monospace">555-1234</text>
  <text x="926" y="232" font-size="13" fill="#94a3b8" font-family="Consolas, monospace"> or </text>
  <!-- 高亮匹配2 -->
  <rect x="952" y="218" width="64" height="18" rx="3" fill="#dbeafe"/>
  <text x="952" y="232" font-size="13" fill="#3b82f6" font-weight="600" font-family="Consolas, monospace">555-5678</text>

  <text x="824" y="256" font-size="13" fill="#94a3b8" font-family="Consolas, monospace">for support. Also </text>
  <!-- 高亮匹配3 -->
  <rect x="968" y="242" width="64" height="18" rx="3" fill="#dbeafe"/>
  <text x="968" y="256" font-size="13" fill="#3b82f6" font-weight="600" font-family="Consolas, monospace">800-9999</text>

  <text x="824" y="280" font-size="13" fill="#94a3b8" font-family="Consolas, monospace">is available for help.</text>

  <!-- 匹配标注 -->
  <rect x="824" y="302" width="340" height="1" fill="#e2e8f0"/>
  <text x="824" y="322" font-size="10" fill="#64748b">匹配 #1: 位置 5-13</text>
  <text x="824" y="340" font-size="10" fill="#64748b">匹配 #2: 位置 17-25</text>
  <text x="824" y="358" font-size="10" fill="#64748b">匹配 #3: 位置 45-53</text>

  <!-- ========== 下方: 匹配分组表格 ========== -->
  <rect x="256" y="496" width="660" height="180" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="522" font-size="13" fill="#1e293b" font-weight="600">匹配分组</text>

  <!-- 表头 -->
  <rect x="268" y="534" width="636" height="28" rx="4" fill="#f1f5f9"/>
  <text x="288" y="553" font-size="11" fill="#64748b" font-weight="600">匹配 #</text>
  <text x="368" y="553" font-size="11" fill="#64748b" font-weight="600">完整匹配</text>
  <text x="478" y="553" font-size="11" fill="#64748b" font-weight="600">组1 (区号)</text>
  <text x="578" y="553" font-size="11" fill="#64748b" font-weight="600">组2 (号码)</text>
  <text x="680" y="553" font-size="11" fill="#64748b" font-weight="600">起始位置</text>
  <line x1="268" y1="562" x2="904" y2="562" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 列分割线 -->
  <line x1="358" y1="534" x2="358" y2="668" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="468" y1="534" x2="468" y2="668" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="568" y1="534" x2="568" y2="668" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="670" y1="534" x2="670" y2="668" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 行1 -->
  <text x="298" y="582" font-size="11" fill="#1e293b">1</text>
  <text x="368" y="582" font-size="11" fill="#3b82f6" font-family="Consolas, monospace">555-1234</text>
  <text x="478" y="582" font-size="11" fill="#1e293b" font-family="Consolas, monospace">555</text>
  <text x="578" y="582" font-size="11" fill="#1e293b" font-family="Consolas, monospace">1234</text>
  <text x="680" y="582" font-size="11" fill="#64748b" font-family="Consolas, monospace">5</text>
  <line x1="268" y1="592" x2="904" y2="592" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 行2 -->
  <text x="298" y="612" font-size="11" fill="#1e293b">2</text>
  <text x="368" y="612" font-size="11" fill="#3b82f6" font-family="Consolas, monospace">555-5678</text>
  <text x="478" y="612" font-size="11" fill="#1e293b" font-family="Consolas, monospace">555</text>
  <text x="578" y="612" font-size="11" fill="#1e293b" font-family="Consolas, monospace">5678</text>
  <text x="680" y="612" font-size="11" fill="#64748b" font-family="Consolas, monospace">17</text>
  <line x1="268" y1="622" x2="904" y2="622" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 行3 -->
  <text x="298" y="642" font-size="11" fill="#1e293b">3</text>
  <text x="368" y="642" font-size="11" fill="#3b82f6" font-family="Consolas, monospace">800-9999</text>
  <text x="478" y="642" font-size="11" fill="#1e293b" font-family="Consolas, monospace">800</text>
  <text x="578" y="642" font-size="11" fill="#1e293b" font-family="Consolas, monospace">9999</text>
  <text x="680" y="642" font-size="11" fill="#64748b" font-family="Consolas, monospace">45</text>

  <!-- ========== 右侧面板: 常用正则库 ========== -->
  <rect x="932" y="496" width="252" height="290" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="956" y="522" font-size="13" fill="#1e293b" font-weight="600">常用正则库</text>
  <!-- 折叠箭头 -->
  <polyline points="1048,514 1054,520 1060,514" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 正则库列表 -->
  <rect x="944" y="536" width="228" height="30" rx="4" fill="#f8fafc"/>
  <text x="960" y="556" font-size="12" fill="#1e293b">手机号</text>
  <text x="1020" y="556" font-size="10" fill="#94a3b8" font-family="Consolas, monospace">^1[3-9]\d{9}$</text>
  <rect x="1112" y="542" width="44" height="22" rx="4" fill="url(#primaryBtn)"/>
  <text x="1120" y="557" font-size="10" fill="#ffffff">使用</text>

  <rect x="944" y="572" width="228" height="30" rx="4" fill="#f8fafc"/>
  <text x="960" y="592" font-size="12" fill="#1e293b">邮箱</text>
  <text x="1006" y="592" font-size="9" fill="#94a3b8" font-family="Consolas, monospace">^\w+@\w+\.\w+$</text>
  <rect x="1112" y="578" width="44" height="22" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1120" y="593" font-size="10" fill="#64748b">使用</text>

  <rect x="944" y="608" width="228" height="30" rx="4" fill="#f8fafc"/>
  <text x="960" y="628" font-size="12" fill="#1e293b">IP 地址</text>
  <text x="1020" y="628" font-size="9" fill="#94a3b8" font-family="Consolas, monospace">^\d{1,3}(\.\d{1,3}){3}$</text>
  <rect x="1112" y="614" width="44" height="22" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1120" y="629" font-size="10" fill="#64748b">使用</text>

  <rect x="944" y="644" width="228" height="30" rx="4" fill="#f8fafc"/>
  <text x="960" y="664" font-size="12" fill="#1e293b">URL</text>
  <text x="1000" y="664" font-size="9" fill="#94a3b8" font-family="Consolas, monospace">^https?://\S+$</text>
  <rect x="1112" y="650" width="44" height="22" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1120" y="665" font-size="10" fill="#64748b">使用</text>

  <rect x="944" y="680" width="228" height="30" rx="4" fill="#f8fafc"/>
  <text x="960" y="700" font-size="12" fill="#1e293b">身份证号</text>
  <text x="1036" y="700" font-size="9" fill="#94a3b8" font-family="Consolas, monospace">^\d{17}[\dXx]$</text>
  <rect x="1112" y="686" width="44" height="22" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1120" y="701" font-size="10" fill="#64748b">使用</text>

  <rect x="944" y="716" width="228" height="30" rx="4" fill="#f8fafc"/>
  <text x="960" y="736" font-size="12" fill="#1e293b">日期格式</text>
  <text x="1036" y="736" font-size="9" fill="#94a3b8" font-family="Consolas, monospace">^\d{4}-\d{2}-\d{2}$</text>
  <rect x="1112" y="722" width="44" height="22" rx="4" fill="#ffffff" stroke="#d0d5dd" stroke-width="1"/>
  <text x="1120" y="737" font-size="10" fill="#64748b">使用</text>

  <text x="956" y="770" font-size="10" fill="#94a3b8">更多正则...</text>
</svg>
